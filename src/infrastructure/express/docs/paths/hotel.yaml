paths:
    /hotels:
        post:
            summary: Create a new hotel
            tags:
                - Hotels
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/HotelInput'
            responses:
                '201':
                    description: Hotel created successfully
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Hotel'
                '400':
                    description: Invalid input
                '500':
                    description: Internal server error

        get:
            summary: Get all hotels
            tags:
                - Hotels
            responses:
                '200':
                    description: List of hotels
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Hotel'
                '500':
                    description: Internal server error

    /hotels/locations:
        get:
            summary: Get all distinct hotel locations
            tags:
                - Hotels
            responses:
                '200':
                    description: List of distinct locations
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    type: string
                '500':
                    description: Internal server error

    /hotels/{id}:
        get:
            summary: Get a hotel by ID
            tags:
                - Hotels
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
                  description: Hotel ID (Mongo ObjectId)
            responses:
                '200':
                    description: Hotel found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Hotel'
                '400':
                    description: Invalid hotel ID format
                '404':
                    description: Hotel not found
                '500':
                    description: Internal server error

        put:
            summary: Update a hotel by ID
            tags:
                - Hotels
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
                  description: Hotel ID (Mongo ObjectId)
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/HotelInputPartial'
            responses:
                '200':
                    description: Hotel updated successfully
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Hotel'
                '404':
                    description: Hotel not found
                '500':
                    description: Internal server error

        delete:
            summary: Delete a hotel by ID
            tags:
                - Hotels
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
                  description: Hotel ID (Mongo ObjectId)
            responses:
                '204':
                    description: Hotel deleted successfully
                '500':
                    description: Internal server error

components:
    schemas:
        HotelInput:
            type: object
            required:
                - name
                - location
            properties:
                name:
                    type: string
                    example: 'Hotel Sunrise'
                location:
                    type: string
                    example: 'Santa Cruz, Bolivia'
                description:
                    type: string
                    example: 'A cozy hotel with free Wi-Fi and breakfast.'

        HotelInputPartial:
            type: object
            properties:
                name:
                    type: string
                    example: 'Hotel Sunrise'
                location:
                    type: string
                    example: 'Santa Cruz, Bolivia'
                description:
                    type: string
                    example: 'A cozy hotel with free Wi-Fi and breakfast.'

        Hotel:
            allOf:
                - $ref: '#/components/schemas/HotelInput'
                - type: object
                  properties:
                      _id:
                          type: string
                          example: '64eab3e5f47d3b3e9f73f612'
                      createdAt:
                          type: string
                          format: date-time
                          example: '2025-07-27T19:00:00.000Z'
                      updatedAt:
                          type: string
                          format: date-time
                          example: '2025-07-27T19:00:00.000Z'
