paths:
    /rooms:
        post:
            summary: Create a new room
            tags:
                - Rooms
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RoomInput'
            responses:
                '201':
                    description: Room created successfully
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Room'
                '400':
                    description: Invalid input
                '500':
                    description: Internal server error

        get:
            summary: Get all rooms
            tags:
                - Rooms
            responses:
                '200':
                    description: List of rooms
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Room'
                '500':
                    description: Internal server error

    /rooms/search:
        get:
            summary: Search rooms with filters
            tags:
                - Rooms
            parameters:
                - in: query
                  name: hotelId
                  required: false
                  schema:
                      type: string
                - in: query
                  name: location
                  required: false
                  schema:
                      type: string
                - in: query
                  name: minCapacity
                  required: false
                  schema:
                      type: integer
                - in: query
                  name: minPrice
                  required: false
                  schema:
                      type: number
                      format: float
                - in: query
                  name: maxPrice
                  required: false
                  schema:
                      type: number
                      format: float
                - in: query
                  name: type
                  required: false
                  schema:
                      type: string
                      enum: [single-1, single-2, single-3, suite-2, suite-family]
            responses:
                '200':
                    description: Matching rooms
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Room'

    /rooms/available:
        get:
            summary: Find available rooms by date range
            tags:
                - Rooms
            parameters:
                - in: query
                  name: hotelId
                  required: true
                  schema:
                      type: string
                - in: query
                  name: checkInDate
                  required: true
                  schema:
                      type: string
                      format: date
                - in: query
                  name: checkOutDate
                  required: true
                  schema:
                      type: string
                      format: date
            responses:
                '200':
                    description: Available rooms
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Room'
                '400':
                    description: Missing required query parameters

    /rooms/by-type:
        get:
            summary: Find rooms by type and hotel
            tags:
                - Rooms
            parameters:
                - in: query
                  name: hotelId
                  required: true
                  schema:
                      type: string
                - in: query
                  name: type
                  required: true
                  schema:
                      type: string
                      enum: [single-1, single-2, single-3, suite-2, suite-family]
            responses:
                '200':
                    description: Matching rooms
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Room'
                '400':
                    description: Missing required query parameters

    /rooms/hotel/{hotelId}:
        get:
            summary: Get rooms by hotel ID
            tags:
                - Rooms
            parameters:
                - in: path
                  name: hotelId
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Rooms for the specified hotel
                    content:
                        application/json:
                            schema:
                                type: array
                                items:
                                    $ref: '#/components/schemas/Room'

    /rooms/{id}:
        get:
            summary: Get a room by ID
            tags:
                - Rooms
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '200':
                    description: Room found
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Room'
                '400':
                    description: Invalid ID format
                '404':
                    description: Room not found
                '500':
                    description: Internal server error

        put:
            summary: Update a room by ID
            tags:
                - Rooms
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/RoomInputPartial'
            responses:
                '200':
                    description: Room updated successfully
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/Room'
                '404':
                    description: Room not found
                '500':
                    description: Internal server error

        delete:
            summary: Delete a room by ID
            tags:
                - Rooms
            parameters:
                - in: path
                  name: id
                  required: true
                  schema:
                      type: string
            responses:
                '204':
                    description: Room deleted successfully
                '500':
                    description: Internal server error

components:
    schemas:
        RoomInput:
            type: object
            required:
                - hotelId
                - type
                - basePrice
                - capacity
            properties:
                hotelId:
                    type: string
                    example: '64eab3e5f47d3b3e9f73f612'
                type:
                    type: string
                    enum: [single-1, single-2, single-3, suite-2, suite-family]
                    example: 'single-1'
                basePrice:
                    type: number
                    format: float
                    example: 120.00
                amenities:
                    type: array
                    items:
                        type: string
                    example: ['WiFi', 'AC', 'TV']
                capacity:
                    type: integer
                    example: 2

        RoomInputPartial:
            type: object
            properties:
                hotelId:
                    type: string
                    example: '64eab3e5f47d3b3e9f73f612'
                type:
                    type: string
                    enum: [single-1, single-2, single-3, suite-2, suite-family]
                    example: 'suite-family'
                basePrice:
                    type: number
                    format: float
                    example: 199.99
                amenities:
                    type: array
                    items:
                        type: string
                    example: ['Jacuzzi', 'Balcony', 'Minibar']
                capacity:
                    type: integer
                    example: 4

        Room:
            allOf:
                - $ref: '#/components/schemas/RoomInput'
                - type: object
                  properties:
                      _id:
                          type: string
                          example: '64ead1d6f81a9c001efc8a92'
                      createdAt:
                          type: string
                          format: date-time
                      updatedAt:
                          type: string
                          format: date-time
