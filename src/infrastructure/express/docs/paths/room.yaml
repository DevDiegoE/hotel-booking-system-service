paths:
    /rooms:
      post:
        summary: Create a new room
        tags:
          - Rooms
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomInput'
        responses:
          '201':
            description: Room created successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Room'
          '400':
            description: Invalid input
          '500':
            description: Internal server error
            
      get:
        summary: Get all rooms
        tags:
          - Rooms
        responses:
          '200':
            description: List of rooms
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/Room'
          '500':
            description: Internal server error

    /rooms/{id}:
      get:
        summary: Get a room by ID
        tags:
          - Rooms
        parameters:
          - in: path
            name: id
            required: true
            schema:
              type: string
        responses:
          '200':
            description: Room found
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Room'
          '400':
            description: Invalid ID format
          '404':
            description: Room not found
          '500':
            description: Internal server error

      put:
        summary: Update a room by ID
        tags:
          - Rooms
        parameters:
          - in: path
            name: id
            required: true
            schema:
              type: string
        requestBody:
          required: true
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomInputPartial'
        responses:
          '200':
            description: Room updated successfully
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/Room'
          '404':
            description: Room not found
          '500':
            description: Internal server error

      delete:
        summary: Delete a room by ID
        tags:
          - Rooms
        parameters:
          - in: path
            name: id
            required: true
            schema:
              type: string
        responses:
          '204':
            description: Room deleted successfully
          '500':
            description: Internal server error

components:
  schemas:
      RoomInput:
        type: object
        required:
          - hotelId
          - type
          - basePrice
        properties:
          hotelId:
            type: string
            example: "64eab3e5f47d3b3e9f73f612"
          type:
            type: string
            enum: [single-1, single-2, single-3, suite-2, suite-family]
            example: "single-1"
          basePrice:
            type: number
            format: float
            example: 120.00
          amenities:
            type: array
            items:
              type: string
            example: ["WiFi", "AC", "TV"]

      RoomInputPartial:
        type: object
        properties:
          hotelId:
            type: string
            example: "64eab3e5f47d3b3e9f73f612"
          type:
            type: string
            enum: [single-1, single-2, single-3, suite-2, suite-family]
            example: "suite-family"
          basePrice:
            type: number
            format: float
            example: 199.99
          amenities:
            type: array
            items:
              type: string
            example: ["Jacuzzi", "Balcony", "Minibar"]

      Room:
        allOf:
          - $ref: '#/components/schemas/RoomInput'
          - type: object
            properties:
              _id:
                type: string
                example: "64ead1d6f81a9c001efc8a92"
              createdAt:
                type: string
                format: date-time
              updatedAt:
                type: string
                format: date-time
