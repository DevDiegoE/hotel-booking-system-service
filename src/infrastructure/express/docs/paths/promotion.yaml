paths:
    /promotions:
        post:
          summary: Create a new promotion
          tags:
            - Promotions
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/PromotionInput'
          responses:
            '201':
              description: Promotion created successfully
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Promotion'
            '400':
              description: Invalid input
            '500':
              description: Internal server error

        get:
          summary: Get all promotions
          tags:
            - Promotions
          responses:
            '200':
              description: List of promotions
              content:
                application/json:
                  schema:
                    type: array
                    items:
                      $ref: '#/components/schemas/Promotion'
            '500':
              description: Internal server error

    /promotions/{id}:
        get:
          summary: Get a promotion by ID
          tags:
            - Promotions
          parameters:
            - in: path
              name: id
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Promotion found
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Promotion'
            '400':
              description: Invalid ID format
            '404':
              description: Promotion not found
            '500':
              description: Internal server error

        put:
          summary: Update a promotion by ID
          tags:
            - Promotions
          parameters:
            - in: path
              name: id
              required: true
              schema:
                type: string
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/PromotionInputPartial'
          responses:
            '200':
              description: Promotion updated successfully
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Promotion'
            '404':
              description: Promotion not found
            '500':
              description: Internal server error

        delete:
          summary: Delete a promotion by ID
          tags:
            - Promotions
          parameters:
            - in: path
              name: id
              required: true
              schema:
                type: string
          responses:
            '204':
              description: Promotion deleted successfully
            '500':
              description: Internal server error

    /promotions/name/{name}:
        get:
          summary: Get promotion by name
          tags:
            - Promotions
          parameters:
            - in: path
              name: name
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Promotion found
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/Promotion'
            '404':
              description: Promotion not found
            '500':
              description: Internal server error

    /promotions/type/{type}:
        get:
          summary: Get promotions by type
          tags:
            - Promotions
          parameters:
            - in: path
              name: type
              required: true
              schema:
                type: string
                enum: [age-discount, family-discount]
          responses:
            '200':
              description: List of promotions
              content:
                application/json:
                  schema:
                    type: array
                    items:
                      $ref: '#/components/schemas/Promotion'
            '500':
              description: Internal server error

components:
    schemas:
        PromotionInput:
            type: object
            required:
              - name
              - description
              - type
              - rules
              - startDate
              - endDate
              - discountPercentage
            properties:
              name:
                type: string
                example: "Summer Special"
              description:
                type: string
                example: "Discount for families during summer season"
              type:
                type: string
                enum: [age-discount, family-discount]
                example: "family-discount"
              rules:
                type: object
                properties:
                  minAdults:
                    type: integer
                    example: 2
                  freeChildrenUnderAge:
                    type: integer
                    example: 12
              startDate:
                type: string
                format: date
                example: "2025-12-01"
              endDate:
                type: string
                format: date
                example: "2026-01-31"
              discountPercentage:
                type: number
                minimum: 0
                maximum: 100
                example: 15

        PromotionInputPartial:
            type: object
            properties:
              name:
                type: string
              description:
                type: string
              type:
                type: string
                enum: [age-discount, family-discount]
              rules:
                type: object
                properties:
                  minAdults:
                    type: integer
                  freeChildrenUnderAge:
                    type: integer
              startDate:
                type: string
                format: date
              endDate:
                type: string
                format: date
              discountPercentage:
                type: number
                minimum: 0
                maximum: 100

        Promotion:
            allOf:
              - $ref: '#/components/schemas/PromotionInput'
              - type: object
                properties:
                  _id:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
